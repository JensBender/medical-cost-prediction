<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;family=Inter:wght@400;500;600;700&amp;display=swap');

      /* Core SVG styling */
      text { user-select: none; }
      .bg-main { fill: #020617; }
      .grid-pattern { stroke: #1e293b; stroke-width: 0.5; stroke-opacity: 0.4; fill: none; }
      
      /* Box Styling */
      .box-outer { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 12px; }
      .box-inner { fill: #1e293b; stroke: #475569; stroke-width: 1.5; rx: 8px; transition: all 0.3s ease; }
      .box-inner:hover { filter: brightness(1.15); stroke: #64748b; cursor: pointer; }
      
      /* Typography */
      .text-title { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 700; fill: #f8fafc; text-anchor: middle; }
      .text-subtitle { font-family: 'Fira Code', monospace; font-size: 13px; font-weight: 500; fill: #94a3b8; text-anchor: middle; }
      .text-code { font-family: 'Fira Code', monospace; font-size: 12px; fill: #cbd5e1; text-anchor: middle; }
      .text-desc { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #94a3b8; text-anchor: middle; }
      
      /* Syntax Highlighting */
      .hl-class { fill: #c084fc; font-weight: 600; }
      .hl-string { fill: #fdba74; }
      .hl-bool { fill: #5eead4; }
      .hl-kw { fill: #7dd3fc; }
      .hl-num { fill: #38bdf8; }
      .hl-cat { fill: #4ade80; }
      .hl-ord { fill: #34d399; }
      .hl-nom { fill: #facc15; }
      .hl-bin { fill: #d8b4fe; }
      .hl-eng { fill: #f9a8d4; }
      
      /* Path Lines */
      .base-line { stroke: #1e293b; stroke-width: 6; fill: none; stroke-linejoin: round; }
      .flow-line { 
        stroke: #38bdf8; 
        stroke-width: 2.5; 
        fill: none; 
        stroke-dasharray: 10 10; 
        stroke-linejoin: round;
        animation: flow 1.5s linear infinite; 
      }
      .flow-line-cat { stroke: #4ade80; }
      .flow-line-nom { stroke: #facc15; }
      .flow-line-bin { stroke: #d8b4fe; }

      /* Animations */
      @keyframes flow {
        from { stroke-dashoffset: 20; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes pulse-box {
        0%, 100% { stroke: #334155; filter: none; }
        50% { stroke: #38bdf8; filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.4)); }
      }

      .pulse-1 { animation: pulse-box 7.5s infinite; animation-delay: 0s; }
      .pulse-2 { animation: pulse-box 7.5s infinite; animation-delay: 1.5s; }
      .pulse-3 { animation: pulse-box 7.5s infinite; animation-delay: 3.0s; }
      .pulse-4 { animation: pulse-box 7.5s infinite; animation-delay: 4.5s; }
      .pulse-out { animation: pulse-box 7.5s infinite; animation-delay: 6.0s; }
    </style>

    <!-- Grid Pattern -->
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" class="grid-pattern" />
    </pattern>

    <!-- Drop Shadow Filter for Glows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg-main" />
  <rect width="100%" height="100%" fill="url(#bg-grid)" />

  <!-- Global Header -->
  <g transform="translate(500, 45)">
    <text class="text-title" style="font-size: 24px;">Data Preprocessing Pipeline (scikit-learn)</text>
    <text y="25" class="text-subtitle" style="font-size: 14px; fill: #38bdf8;">Robust data preprocessing with missing value handling, medical feature engineering, feature scaling &amp; encoding</text>
  </g>

  <!-- ============================================== PATHS (Connections) ============================================== -->
  <g id="data-connections">
    <!-- Input to Step 1 -->
    <path d="M 500,160 L 500,240" class="base-line" />
    <path d="M 500,160 L 500,240" class="flow-line" />

    <!-- Step 1 to Step 2 Split (Top) -->
    <path d="M 500,340 L 500,370 L 300,370 L 300,450" class="base-line" />
    <path d="M 500,340 L 500,370 L 700,370 L 700,450" class="base-line" />
    <path d="M 500,340 L 500,370 L 300,370 L 300,450" class="flow-line" />
    <path d="M 500,340 L 500,370 L 700,370 L 700,450" class="flow-line flow-line-cat" />

    <!-- Step 2 Merge (Bottom) to Step 3 -->
    <path d="M 300,560 L 300,610 L 500,610 L 500,640" class="base-line" />
    <path d="M 700,560 L 700,610 L 500,610 L 500,640" class="base-line" />
    <path d="M 300,560 L 300,610 L 500,610 L 500,640" class="flow-line" />
    <path d="M 700,560 L 700,610 L 500,610 L 500,640" class="flow-line flow-line-cat" />

    <!-- Step 4 Split (Top) -->
    <path d="M 500,760 L 500,790 L 162.5,790 L 162.5,870" class="base-line" />
    <path d="M 500,760 L 500,790 L 387.5,790 L 387.5,870" class="base-line" />
    <path d="M 500,760 L 500,790 L 612.5,790 L 612.5,870" class="base-line" />
    <path d="M 500,760 L 500,790 L 837.5,790 L 837.5,870" class="base-line" />

    <path d="M 500,760 L 500,790 L 162.5,790 L 162.5,870" class="flow-line" />
    <path d="M 500,760 L 500,790 L 387.5,790 L 387.5,870" class="flow-line flow-line-cat" />
    <path d="M 500,760 L 500,790 L 612.5,790 L 612.5,870" class="flow-line flow-line-nom" />
    <path d="M 500,760 L 500,790 L 837.5,790 L 837.5,870" class="flow-line flow-line-bin" />

    <!-- Step 4 Merge (Bottom) -->
    <path d="M 162.5,1020 L 162.5,1070 L 500,1070 L 500,1100" class="base-line" />
    <path d="M 387.5,1020 L 387.5,1070 L 500,1070 L 500,1100" class="base-line" />
    <path d="M 612.5,1020 L 612.5,1070 L 500,1070 L 500,1100" class="base-line" />
    <path d="M 837.5,1020 L 837.5,1070 L 500,1070 L 500,1100" class="base-line" />

    <path d="M 162.5,1020 L 162.5,1070 L 500,1070 L 500,1100" class="flow-line" />
    <path d="M 387.5,1020 L 387.5,1070 L 500,1070 L 500,1100" class="flow-line flow-line-cat" />
    <path d="M 612.5,1020 L 612.5,1070 L 500,1070 L 500,1100" class="flow-line flow-line-nom" />
    <path d="M 837.5,1020 L 837.5,1070 L 500,1070 L 500,1100" class="flow-line flow-line-bin" />
  </g>

  <!-- ============================================== NODES ============================================== -->

  <!-- Input Data -->
  <g id="input-data" transform="translate(200, 100)">
    <rect width="600" height="60" class="box-outer" style="fill: #0b0f19; border: 1px dashed #475569;" />
    <text x="300" y="25" class="text-title" style="fill: #e2e8f0;">Input Data (Features)</text>
    <text x="300" y="45" class="text-code">
      <tspan fill="#94a3b8">Expects: </tspan><tspan class="hl-class">pandas.DataFrame</tspan>
    </text>
  </g>

  <!-- Step 1: Missing Value Checker -->
  <g id="step-1" transform="translate(200, 240)">
    <rect width="600" height="100" class="box-outer pulse-1" />
    <text x="300" y="25" class="text-title">
      1. <tspan class="hl-class">Missing Value Checker</tspan>
    </text>
    
    <!-- Step 1 Left Inner -->
    <g transform="translate(20, 40)">
      <rect width="270" height="45" class="box-inner" />
      <rect width="4" height="45" fill="#ef4444" rx="2" />
      <text x="135" y="18" class="text-subtitle" style="fill: #f1f5f9;">Required Features</text>
      <text x="135" y="35" class="text-code">
        <tspan class="hl-kw">strict</tspan>=<tspan class="hl-bool">True</tspan> → <tspan fill="#fca5a5">Raise MissingValueError</tspan>
      </text>
    </g>

    <!-- Step 1 Right Inner -->
    <g transform="translate(310, 40)">
      <rect width="270" height="45" class="box-inner" />
      <rect width="4" height="45" fill="#f97316" rx="2" />
      <text x="135" y="18" class="text-subtitle" style="fill: #f1f5f9;">Optional Features</text>
      <text x="135" y="35" class="text-code">If missing → <tspan fill="#fdba74">Log Warning</tspan></text>
    </g>
  </g>

  <!-- Step 2: Missing Value Imputation -->
  <g id="step-2" transform="translate(100, 400)">
    <rect width="800" height="180" class="box-outer pulse-2" />
    <text x="400" y="25" class="text-title">
      2. <tspan class="hl-class">Missing Value Imputer</tspan> (ColumnTransformer)
    </text>

    <!-- Step 2 Inner 1 (Numerical) -->
    <g transform="translate(30, 50)">
      <rect width="340" height="110" class="box-inner" />
      <rect width="5" height="110" fill="#38bdf8" rx="2.5" />
      <text x="170" y="25" class="text-subtitle" style="font-weight: 700; fill: #e2e8f0;">Numerical Imputer</text>
      <text x="170" y="50" class="text-code">
        <tspan class="hl-class">RobustSimpleImputer</tspan>(
      </text>
      <text x="170" y="70" class="text-code">
        <tspan class="hl-kw">strategy</tspan>=<tspan class="hl-string">"median"</tspan>)
      </text>
      <text x="170" y="95" class="text-code hl-num" style="font-weight: 600;">[numerical_features]</text>
    </g>

    <!-- Step 2 Inner 2 (Categorical) -->
    <g transform="translate(430, 50)">
      <rect width="340" height="110" class="box-inner" />
      <rect width="5" height="110" fill="#4ade80" rx="2.5" />
      <text x="170" y="25" class="text-subtitle" style="font-weight: 700; fill: #e2e8f0;">Categorical Imputer</text>
      <text x="170" y="50" class="text-code">
        <tspan class="hl-class">RobustSimpleImputer</tspan>(
      </text>
      <text x="170" y="70" class="text-code">
        <tspan class="hl-kw">strategy</tspan>=<tspan class="hl-string">"most_frequent"</tspan>)
      </text>
      <text x="170" y="95" class="text-code hl-cat" style="font-weight: 600;">[ordinal + nominal + binary]</text>
    </g>
  </g>

  <!-- Step 3: Medical Feature Deriver -->
  <g id="step-3" transform="translate(200, 640)">
    <rect width="600" height="120" class="box-outer pulse-3" />
    <text x="300" y="25" class="text-title">
      3. <tspan class="hl-class">Medical Feature Deriver</tspan>
    </text>
    <text x="300" y="50" class="text-desc">Aggregates specific binary indicators into counts</text>

    <!-- Inner feature blocks -->
    <g transform="translate(80, 65)">
      <rect width="210" height="40" class="box-inner" style="fill: #1e293b;" />
      <rect width="4" height="40" fill="#f9a8d4" rx="2" />
      <text x="105" y="18" class="text-code hl-eng" style="font-weight: bold;">CHRONIC_COUNT</text>
      <text x="105" y="32" class="text-code" style="font-size: 10px;">Sum of chronic condition flags</text>
    </g>
    
    <g transform="translate(310, 65)">
      <rect width="210" height="40" class="box-inner" style="fill: #1e293b;" />
      <rect width="4" height="40" fill="#f9a8d4" rx="2" />
      <text x="105" y="18" class="text-code hl-eng" style="font-weight: bold;">LIMITATION_COUNT</text>
      <text x="105" y="32" class="text-code" style="font-size: 10px;">Sum of functional limits flags</text>
    </g>
  </g>

  <!-- Step 4: Feature Scaling and Encoding -->
  <g id="step-4" transform="translate(40, 820)">
    <rect width="920" height="220" class="box-outer pulse-4" />
    <text x="460" y="25" class="text-title">
      4. <tspan class="hl-class">Feature Scaler &amp; Encoder</tspan> (ColumnTransformer)
    </text>

    <!-- Step 4 Inner 1 (Numerical + Engineered) -->
    <g transform="translate(20, 50)">
      <rect width="205" height="150" class="box-inner" />
      <rect width="5" height="150" fill="#38bdf8" rx="2.5" />
      <text x="102.5" y="25" class="text-subtitle" style="font-weight: 700; fill: #e2e8f0;">Numerical Scaler</text>
      <text x="102.5" y="55" class="text-code hl-class">RobustStandardScaler()</text>
      <text x="102.5" y="90" class="text-desc">Transforms to:</text>
      <text x="102.5" y="105" class="text-code" style="font-size: 11px;">mean=0, variance=1</text>
      <text x="102.5" y="130" class="text-code hl-num" style="font-weight: 600;">[numerical_features]</text>
      <text x="102.5" y="145" class="text-code hl-eng" style="font-weight: 600;">+[OUTPUT_FEATURES]</text>
    </g>

    <!-- Step 4 Inner 2 (Ordinal) -->
    <g transform="translate(245, 50)">
      <rect width="205" height="150" class="box-inner" />
      <rect width="5" height="150" fill="#34d399" rx="2.5" />
      <text x="102.5" y="25" class="text-subtitle" style="font-weight: 700; fill: #e2e8f0;">Ordinal Encoder</text>
      <text x="102.5" y="55" class="text-code hl-class">RobustOrdinalEncoder()</text>
      <text x="102.5" y="90" class="text-desc">Preserves internal</text>
      <text x="102.5" y="105" class="text-desc">categorical order</text>
      <text x="102.5" y="138" class="text-code hl-ord" style="font-weight: 600;">[ordinal_features]</text>
    </g>

    <!-- Step 4 Inner 3 (Nominal) -->
    <g transform="translate(470, 50)">
      <rect width="205" height="150" class="box-inner" />
      <rect width="5" height="150" fill="#facc15" rx="2.5" />
      <text x="102.5" y="25" class="text-subtitle" style="font-weight: 700; fill: #e2e8f0;">Nominal Encoder</text>
      <text x="102.5" y="50" class="text-code hl-class">RobustOneHotEncoder(</text>
      <text x="102.5" y="65" class="text-code">
        <tspan class="hl-kw">drop</tspan>=<tspan class="hl-string">"first"</tspan>,
      </text>
      <text x="102.5" y="80" class="text-code">
        <tspan class="hl-kw">sparse_output</tspan>=<tspan class="hl-bool">False</tspan>)
      </text>
      <text x="102.5" y="105" class="text-desc">Creates binary dummies</text>
      <text x="102.5" y="138" class="text-code hl-nom" style="font-weight: 600;">[nominal_features]</text>
    </g>

    <!-- Step 4 Inner 4 (Binary) -->
    <g transform="translate(695, 50)">
      <rect width="205" height="150" class="box-inner" />
      <rect width="5" height="150" fill="#d8b4fe" rx="2.5" />
      <text x="102.5" y="25" class="text-subtitle" style="font-weight: 700; fill: #e2e8f0;">Binary Passthrough</text>
      <text x="102.5" y="55" class="text-code hl-string">"passthrough"</text>
      <text x="102.5" y="90" class="text-desc">Passes through unchanged</text>
      <text x="102.5" y="105" class="text-desc">(Already 0/1 coded)</text>
      <text x="102.5" y="138" class="text-code hl-bin" style="font-weight: 600;">[binary_features]</text>
    </g>
  </g>

  <!-- Output Data -->
  <g id="output-data" transform="translate(250, 1100)">
    <rect width="500" height="80" class="box-outer pulse-out" style="fill: #1e293b; stroke: #818cf8; stroke-width: 3;" filter="url(#glow)" />
    <text x="250" y="32" class="text-title" style="fill: #ffffff;">Output Data (Model-Ready Features)</text>
    <text x="250" y="55" class="text-desc" style="fill: #c7d2fe;">Fully Imputed, Engineered, Scaled &amp; Encoded</text>
    
    <!-- Little decorative checkmarks or stars -->
    <path d="M 50,40 L 60,50 L 80,30" stroke="#4ade80" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 420,40 L 430,50 L 450,30" stroke="#4ade80" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>