<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1360" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;family=Inter:wght@400;500;600;700&amp;display=swap');

      /* Core SVG styling */
      text { user-select: none; }
      .bg-main { fill: #020617; }
      .grid-pattern { stroke: #1e293b; stroke-width: 0.5; stroke-opacity: 0.4; fill: none; }
      
      /* Box Styling */
      .box-outer { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 12px; }
      .box-inner { fill: #1e293b; stroke: #475569; stroke-width: 1.5; rx: 8px; transition: all 0.3s ease; }
      .box-inner:hover { filter: brightness(1.15); stroke: #64748b; cursor: pointer; }
      
      /* Typography */
      .text-title { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .text-subtitle { font-family: 'Fira Code', monospace; font-size: 13px; font-weight: 500; fill: #94a3b8; text-anchor: middle; }
      .text-code { font-family: 'Fira Code', monospace; font-size: 12px; fill: #cbd5e1; text-anchor: middle; }
      .text-desc { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #94a3b8; text-anchor: middle; }
      
      /* Semantic Colors - Professional Palette */
      .hl-class { fill: #94a3b8; font-weight: 600; } /* Neutral Slate for Logic/Classes */
      .hl-string { fill: #fdba74; }
      .hl-bool { fill: #5eead4; }
      .hl-kw { fill: #7dd3fc; }
      
      /* Feature types - Vibrant highlights */
      .hl-num { fill: #38bdf8; font-weight: 600; } /* Cyan Blue */
      .hl-nom { fill: #facc15; font-weight: 600; } /* Amber Yellow */
      .hl-bin { fill: #d8b4fe; font-weight: 600; } /* Purple/Lavender */
      .hl-cat { fill: #4ade80; font-weight: 600; } /* Emerald Green */
      .hl-eng { fill: #f9a8d4; font-weight: 600; } /* Hot Pink */
      
      /* Path Lines */
      .base-line { stroke: #1e293b; stroke-width: 6; fill: none; stroke-linejoin: round; }
      .flow-line { 
        stroke: #94a3b8; 
        stroke-width: 3.5; 
        fill: none; 
        stroke-dasharray: 10 10; 
        stroke-linejoin: round;
        animation: flow 1.5s linear infinite; 
      }
      
      /* Flow lane specific colors - Matching features */
      .flow-num { stroke: #38bdf8; }
      .flow-nom { stroke: #facc15; }
      .flow-bin { stroke: #d8b4fe; }
      .flow-cat { stroke: #4ade80; }
      .flow-eng { stroke: #f9a8d4; }

      /* Animations */
      @keyframes flow {
        from { stroke-dashoffset: 20; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes pulse-box {
        0%, 100% { stroke: #334155; filter: none; }
        50% { stroke: #475569; filter: drop-shadow(0 0 10px rgba(71, 85, 105, 0.4)); }
      }

      .pulse-1 { animation: pulse-box 9s infinite; animation-delay: 0s; }
      .pulse-2 { animation: pulse-box 9s infinite; animation-delay: 1.5s; }
      .pulse-3 { animation: pulse-box 9s infinite; animation-delay: 3s; }
      .pulse-4 { animation: pulse-box 9s infinite; animation-delay: 4.5s; }
      .pulse-5 { animation: pulse-box 9s infinite; animation-delay: 6s; }
      .pulse-out { animation: pulse-box 9s infinite; animation-delay: 7.5s; }
    </style>

    <!-- Grid Pattern -->
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" class="grid-pattern" />
    </pattern>

    <!-- Drop Shadow Filter for Glows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Arrows for each feature type -->
    <marker id="arrow-def" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto-start-reverse">
       <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-num" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
    <marker id="arrow-nom" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#facc15" />
    </marker>
    <marker id="arrow-bin" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto-start-reverse">
       <path d="M 0 0 L 10 5 L 0 10 z" fill="#d8b4fe" />
    </marker>
    <marker id="arrow-cat" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto-start-reverse">
       <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg-main" />
  <rect width="100%" height="100%" fill="url(#bg-grid)" />

  <!-- Global Header -->
  <g transform="translate(500, 45)">
    <text class="text-title" style="font-size: 24px;">Inference Pipeline</text>
    <text y="25" class="text-subtitle" style="font-size: 14px; fill: #ffffff;">Standardization, Validation, Imputation, Medical Feature Engineering, Scaling &amp; Encoding</text>
  </g>

  <!-- ============================================== PATHS (Connections) ============================================== -->
  <g id="data-connections">
    <!-- Input to Step 1 -->
    <path d="M 500,160 L 500,200" class="base-line" />
    <path d="M 500,160 L 500,200" class="flow-line" marker-end="url(#arrow-def)" />

    <!-- Step 1 to Step 2 -->
    <path d="M 500,310 L 500,350" class="base-line" />
    <path d="M 500,310 L 500,350" class="flow-line" marker-end="url(#arrow-def)" />

    <!-- Step 2 to Step 3 Split (Top) -->
    <path d="M 500,460 C 500,500 305,480 305,540" class="base-line" />
    <path d="M 500,460 C 500,500 695,480 695,540" class="base-line" />
    <path d="M 500,460 C 500,500 305,480 305,540" class="flow-line flow-num" marker-end="url(#arrow-num)" />
    <path d="M 500,460 C 500,500 695,480 695,540" class="flow-line flow-cat" marker-end="url(#arrow-cat)" />

    <!-- Step 3 Merge (Bottom) to Step 4 -->
    <path d="M 305,690 C 305,750 500,710 500,770" class="base-line" />
    <path d="M 695,690 C 695,750 500,710 500,770" class="base-line" />
    <path d="M 305,690 C 305,750 500,710 500,770" class="flow-line flow-num" marker-end="url(#arrow-num)" />
    <path d="M 695,690 C 695,750 500,710 500,770" class="flow-line flow-cat" marker-end="url(#arrow-cat)" />

    <!-- Step 4 to Step 5 Split (Top) -->
    <path d="M 500,900 C 500,940 200,920 200,980" class="base-line" />
    <path d="M 500,900 L 500,980" class="base-line" />
    <path d="M 500,900 C 500,940 800,920 800,980" class="base-line" />

    <path d="M 500,900 C 500,940 200,920 200,980" class="flow-line flow-num" marker-end="url(#arrow-num)" />
    <path d="M 500,900 L 500,980" class="flow-line flow-nom" marker-end="url(#arrow-nom)" />
    <path d="M 500,900 C 500,940 800,920 800,980" class="flow-line flow-bin" marker-end="url(#arrow-bin)" />

    <!-- Step 5 Merge (Bottom) to Output -->
    <path d="M 200,1160 C 200,1220 500,1180 500,1240" class="base-line" />
    <path d="M 500,1160 L 500,1240" class="base-line" />
    <path d="M 800,1160 C 800,1220 500,1180 500,1240" class="base-line" />

    <path d="M 200,1160 C 200,1220 500,1180 500,1240" class="flow-line flow-num" marker-end="url(#arrow-def)" />
    <path d="M 500,1160 L 500,1240" class="flow-line flow-nom" marker-end="url(#arrow-def)" />
    <path d="M 800,1160 C 800,1220 500,1180 500,1240" class="flow-line flow-bin" marker-end="url(#arrow-def)" />
  </g>

  <!-- ============================================== NODES ============================================== -->

  <!-- Input Data -->
  <g id="input-data" transform="translate(200, 100)">
    <rect width="600" height="60" class="box-outer" style="fill: #0b0f19; border: 1px dashed #475569;" />
    <text x="300" y="25" class="text-title">Input Data (Raw Features)</text>
    <text x="300" y="45" class="text-code">
      <tspan class="hl-num">Numerical</tspan> | <tspan class="hl-nom">Nominal</tspan> | <tspan class="hl-bin">Binary</tspan>
    </text>
  </g>

  <!-- Step 1: Categorical Label Standardizer -->
  <g id="step-1" transform="translate(200, 200)">
    <rect width="600" height="110" class="box-outer pulse-1" />
    <text x="300" y="25" class="text-title">1. Categorical Label Standardizer</text>
    
    <!-- Step 1 Left Inner -->
    <g transform="translate(20, 45)">
      <rect width="270" height="45" class="box-inner" />
      <rect width="4" height="45" fill="#facc15" rx="2" />
      <text x="135" y="18" class="text-subtitle" style="fill: #facc15;">Nominal Features</text>
      <text x="135" y="35" class="text-desc">Map to descriptive strings</text>
    </g>

    <!-- Step 1 Right Inner -->
    <g transform="translate(310, 45)">
      <rect width="270" height="45" class="box-inner" />
      <rect width="4" height="45" fill="#d8b4fe" rx="2" />
      <text x="135" y="18" class="text-subtitle" style="fill: #d8b4fe;">Binary Features</text>
      <text x="135" y="35" class="text-desc">Recode to 0/1</text>
    </g>
  </g>

  <!-- Step 2: Missing Value Checker -->
  <g id="step-2" transform="translate(200, 350)">
    <rect width="600" height="110" class="box-outer pulse-2" />
    <text x="300" y="25" class="text-title">2. Missing Value Checker</text>
    
    <!-- Step 2 Left Inner -->
    <g transform="translate(20, 45)">
      <rect width="270" height="45" class="box-inner" />
      <text x="135" y="18" class="text-subtitle" style="fill: #f1f5f9;">Required Features</text>
      <text x="135" y="35" class="text-desc">If missing → Raise Error</text>
    </g>

    <!-- Step 2 Right Inner -->
    <g transform="translate(310, 45)">
      <rect width="270" height="45" class="box-inner" />
      <text x="135" y="18" class="text-subtitle" style="fill: #f1f5f9;">Optional Features</text>
      <text x="135" y="35" class="text-desc">If missing → Log Warning</text>
    </g>
  </g>

  <!-- Step 3: Missing Value Imputation -->
  <g id="step-3" transform="translate(100, 540)">
    <rect width="800" height="150" class="box-outer pulse-3" />
    <text x="400" y="25" class="text-title">3. Missing Value Imputer</text>

    <!-- Step 3 Inner 1 (Numerical) -->
    <g transform="translate(20, 45)">
      <rect width="370" height="90" class="box-inner" />
      <rect width="5" height="90" fill="#38bdf8" rx="2.5" />
      <text x="185" y="22" class="text-subtitle" style="fill: #38bdf8;">Numerical Imputer</text>
      <text x="185" y="47" class="text-code hl-class">RobustSimpleImputer()</text>
      <text x="185" y="72" class="text-desc"><tspan style="font-weight: 600; fill: #38bdf8;">Median</tspan> for <tspan class="hl-num">numerical features</tspan></text>
    </g>

    <!-- Step 3 Inner 2 (Categorical) -->
    <g transform="translate(410, 45)">
      <rect width="370" height="90" class="box-inner" />
      <rect width="5" height="90" fill="#4ade80" rx="2.5" />
      <text x="185" y="22" class="text-subtitle" style="fill: #4ade80;">Categorical Imputer</text>
      <text x="185" y="47" class="text-code hl-class">RobustSimpleImputer()</text>
      <text x="185" y="72" class="text-desc"><tspan style="font-weight: 600; fill: #4ade80;">Mode</tspan> for <tspan class="hl-nom">nominal &amp;</tspan> <tspan class="hl-bin">binary features</tspan></text>
    </g>
  </g>

  <!-- Step 4: Medical Feature Deriver -->
  <g id="step-4" transform="translate(200, 770)">
    <rect width="600" height="130" class="box-outer pulse-4" />
    <text x="300" y="25" class="text-title">4. Medical Feature Deriver</text>
    <text x="300" y="50" class="text-desc">Aggregates specific binary indicators into counts</text>

    <!-- Inner feature blocks -->
    <g transform="translate(80, 70)">
      <rect width="210" height="40" class="box-inner" />
      <rect width="4" height="40" fill="#f9a8d4" rx="2" />
      <text x="105" y="18" class="text-code hl-eng">CHRONIC_COUNT</text>
      <text x="105" y="32" class="text-code" style="font-size: 10px;">Sum of chronic conditions</text>
    </g>
    
    <g transform="translate(310, 70)">
      <rect width="210" height="40" class="box-inner" />
      <rect width="4" height="40" fill="#f9a8d4" rx="2" />
      <text x="105" y="18" class="text-code hl-eng">LIMITATION_COUNT</text>
      <text x="105" y="32" class="text-code" style="font-size: 10px;">Sum of functional limitations</text>
    </g>
  </g>

  <!-- Step 5: Feature Scaling and Encoding -->
  <g id="step-5" transform="translate(40, 980)">
    <rect width="920" height="180" class="box-outer pulse-5" />
    <text x="460" y="25" class="text-title">5. Feature Scaler &amp; Encoder</text>

    <!-- Step 5 Inner 1 (Numerical + Engineered) -->
    <g transform="translate(20, 50)">
      <rect width="280" height="110" class="box-inner" />
      <rect width="5" height="110" fill="#38bdf8" rx="2.5" />
      <text x="140" y="25" class="text-subtitle" style="fill: #38bdf8;">Numerical Scaler</text>
      <text x="140" y="50" class="text-code hl-class">RobustStandardScaler()</text>
      <text x="140" y="75" class="text-desc">Scales <tspan class="hl-num">raw &amp;</tspan> <tspan class="hl-eng">derived features</tspan></text>
      <text x="140" y="90" class="text-desc">to mean=0, variance=1</text>
    </g>

    <!-- Step 5 Inner 2 (Nominal) -->
    <g transform="translate(320, 50)">
      <rect width="280" height="110" class="box-inner" />
      <rect width="5" height="110" fill="#facc15" rx="2.5" />
      <text x="140" y="25" class="text-subtitle" style="fill: #facc15;">Nominal Encoder</text>
      <text x="140" y="50" class="text-code hl-class">RobustOneHotEncoder()</text>
      <text x="140" y="75" class="text-desc">Creates binary dummies for <tspan class="hl-nom">nominal</tspan></text>
      <text x="140" y="90" class="text-desc"><tspan class="hl-nom">features</tspan> &amp; drops designated baseline</text>
    </g>

    <!-- Step 5 Inner 3 (Binary) -->
    <g transform="translate(620, 50)">
      <rect width="280" height="110" class="box-inner" />
      <rect width="5" height="110" fill="#d8b4fe" rx="2.5" />
      <text x="140" y="25" class="text-subtitle" style="fill: #d8b4fe;">Binary Passthrough</text>
      <text x="140" y="50" class="text-desc">"passthrough"</text>
      <text x="140" y="75" class="text-desc">Passes through <tspan class="hl-bin">binary features</tspan></text>
      <text x="140" y="90" class="text-desc">unchanged (already 0/1 coded)</text>
    </g>
  </g>

  <!-- Output Data -->
  <g id="output-data" transform="translate(250, 1240)">
    <rect width="500" height="80" class="box-outer pulse-out" style="fill: #1e293b; stroke: #818cf8; stroke-width: 3;" filter="url(#glow)" />
    <text x="250" y="32" class="text-title">Output Data (Model-Ready Features)</text>
    <text x="250" y="55" class="text-desc">Fully Standardized, Imputed, Engineered, Scaled &amp; Encoded</text>
  </g>
</svg>
