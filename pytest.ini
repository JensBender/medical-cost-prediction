[pytest]
testpaths = tests
addopts = --strict-markers
markers =
    unit: tests of an isolated function or component (fast)
    integration: tests that combine components or external systems (slower)
    e2e: tests of a running application workflow (very slow)

# Git Bash commands on Windows:
# ./.venv-test/Scripts/python -m pytest -m unit
# ./.venv-test/Scripts/python -m pytest -m integration
# ./.venv-test/Scripts/python -m pytest -m e2e
# ./.venv-test/Scripts/python -m pytest -m "not e2e"