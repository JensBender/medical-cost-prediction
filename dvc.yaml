# DVC run commands:
# - Run all stages: dvc repro
# - Run preprocessing stage only: dvc repro preprocess
# - Run baseline model training only: dvc repro baseline
# - Run quantile regression training only: dvc repro quantile

stages:
  # Stage 1: Data Preprocessing
  preprocess:
    cmd: .venv-train\Scripts\python scripts/preprocess.py
    deps:
      - data/h251.sas7bdat                        # Raw data source
      - scripts/preprocess.py                     # Preprocessing script (with reproducible data preparation and preprocessing steps)
      - src/pipeline.py                           # Preprocessing pipeline
      - src/transformers.py                       # Custom transformers
      - src/constants.py                          # Feature lists, label mappings, etc.
      - src/stats.py                              # Statistical helper function to stratify target variable 
    outs:
      - data/training_data_preprocessed.parquet
      - data/validation_data_preprocessed.parquet
      - data/test_data_preprocessed.parquet
      - models/preprocessor.joblib

  # --- Modeling ---
  # Stage 2: Baseline Models
  baseline:
    cmd: .venv-train\Scripts\python scripts/train_baseline.py
    deps:
      - data/training_data_preprocessed.parquet   # Dependency on Stage 1
      - data/validation_data_preprocessed.parquet # Dependency on Stage 1
      - scripts/train_baseline.py                 # Training script for reproducible baseline models 
      - src/modeling.py                           # Model training and evaluation functions
      - src/constants.py                          # Feature lists, label mappings, etc.
    outs:
      - models/median_baseline_model.joblib
      - models/median_baseline_predictions.joblib
      - models/median_baseline_params.json
      - models/lr_baseline_model.joblib
      - models/lr_baseline_predictions.joblib
      - models/lr_baseline_params.json
      - models/en_baseline_model.joblib
      - models/en_baseline_predictions.joblib
      - models/en_baseline_params.json
      - models/tree_baseline_model.joblib
      - models/tree_baseline_predictions.joblib
      - models/tree_baseline_params.json
      - models/rf_baseline_model.joblib
      - models/rf_baseline_predictions.joblib
      - models/rf_baseline_params.json
      - models/xgb_baseline_model.joblib
      - models/xgb_baseline_predictions.joblib
      - models/xgb_baseline_params.json
      - models/svm_baseline_model.joblib
      - models/svm_baseline_predictions.joblib
      - models/svm_baseline_params.json
    metrics:
      - models/median_baseline_metrics.json
      - models/lr_baseline_metrics.json
      - models/en_baseline_metrics.json
      - models/tree_baseline_metrics.json
      - models/rf_baseline_metrics.json
      - models/xgb_baseline_metrics.json
      - models/svm_baseline_metrics.json

  # Stage 3: Quantile Regression
  quantile:
    cmd: .venv-train\Scripts\python scripts/train_xgboost_quantile.py
    deps:
      - data/training_data_preprocessed.parquet   # Dependency on Stage 1
      - data/validation_data_preprocessed.parquet # Dependency on Stage 1
      - scripts/train_xgboost_quantile.py         # Training script for reproducible quantile regression 
      - models/xgb_tuned_params.json              # Hyperparameters of the best tuned (point-estimate) model
      - src/modeling.py                           # Weighted MdAE function, data paths, model persistence functions
      - src/constants.py                          # Column names for target and weights 
    outs:
      - models/xgb_quantile_model.joblib
      - models/xgb_quantile_params.json
      - models/xgb_quantile_predictions.joblib
    metrics:
      - models/xgb_quantile_metrics.json
