stages:
  # Stage 1: Data Preprocessing
  preprocess:
    cmd: .venv-train\Scripts\python scripts/preprocess.py
    deps:
      - data/h251.sas7bdat                        # Raw data source
      - scripts/preprocess.py                     # Preprocessing script (with reproducible data preparation and preprocessing steps)
      - src/pipeline.py                           # Preprocessing pipeline
      - src/transformers.py                       # Custom transformers
      - src/constants.py                          # Feature lists, label mappings, etc.
      - src/utils.py                              # Helper functions
    outs:
      - data/training_data_preprocessed.parquet
      - data/validation_data_preprocessed.parquet
      - data/test_data_preprocessed.parquet

  # --- Modeling ---
  # Stage 2: Baseline Models
  baseline:
    cmd: .venv-train\Scripts\python scripts/train_baseline.py
    deps:
      - data/training_data_preprocessed.parquet   # Dependency on Stage 1
      - data/validation_data_preprocessed.parquet # Dependency on Stage 1
      - scripts/train_baseline.py                 # Training script for reproducible baseline models 
      - src/modeling.py                           # Model training and evaluation functions
      - src/constants.py                          # Feature lists, label mappings, etc.
      - src/utils.py                              # Helper functions
    outs:
      - models/median_baseline_model.joblib
      - models/lr_baseline_model.joblib
      - models/en_baseline_model.joblib
      - models/tree_baseline_model.joblib
      - models/rf_baseline_model.joblib
      - models/xgb_baseline_model.joblib
      - models/svm_baseline_model.joblib
      - models/baselines_metrics.json
      - models/baselines_predictions.joblib
