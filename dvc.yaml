stages:
  # Stage 1: Data Preprocessing
  preprocess:
    cmd: .venv-train\Scripts\python.exe scripts/preprocess.py
    deps:
      - data/h251.sas7bdat                        # Raw data source
      - scripts/preprocess.py                     # Preprocessing script (with deterministic data preparation and preprocessing steps)
      - src/pipeline.py                           # Preprocessing pipeline
      - src/transformers.py                       # Custom transformers
      - src/constants.py                          # Feature lists, label mappings, etc.
      - src/utils.py                              # Helper functions
    outs:
      - data/training_data_preprocessed.parquet
      - data/validation_data_preprocessed.parquet
      - data/test_data_preprocessed.parquet

  # --- Modeling ---
  # Stage 2: Baseline Models
  baseline:
    cmd: .venv-train\Scripts\python.exe scripts/train_baseline.py
    deps:
      - data/training_data_preprocessed.parquet   # Dependency on Stage 1
      - data/validation_data_preprocessed.parquet # Dependency on Stage 1
      - scripts/train_baseline.py                 # Training script for baseline models 
      - src/constants.py                          # Feature lists, label mappings, etc.
      - src/utils.py                              # Helper functions
    outs:
      - models/baseline.joblib
